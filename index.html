<!DOCTYPE html>
<html lang="en">
<head>
    <title>HoverPage</title>

    <style>
        body{margin: 0;}
        
        #passed{color: aliceblue;} /* For ID selectors */
        #failed{color:rgb(103, 47, 12)} /* For ID selectors */

        Header{
            color:rgb(237, 235, 243);
            font-size:50px;
            text-align: center;
            background-color: rgb(121, 73, 235);
            padding: 2vh;
        }

         footer{
            color:rgb(237, 235, 243);
            font-size:35px;
            text-align: center;
            background-color: rgb(121, 73, 235);
            padding: 2vh;
        }

        img{ 
            width: 250px; 
            height: 280px; 
            border:3px solid rgb(4, 4, 4);
            border-radius: 40px;}
  
        .Car{
            background-color: rgb(196, 152, 225);
            display: flex;
            justify-content: space-evenly;
            padding-top: 6vh;
            padding-bottom: 6vh;
            height: 65vh;
            width: 100%;
        }

        .Bag{
          
            background-color: rgb(164, 115, 223);
            border: 3px solid rgb(4, 4, 4);
            width: 280px; height: 450px;
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.5s ease-in-out;
        
        }

        .Car:hover .Bag{transform: scale(0.8);
        }
        .Bag h1:last-child {opacity: 0; transition: 0.03s;} /*Making Result Status disappear*/

        .Car .Bag:hover {transform: scale(0.9) rotate(5deg) ;
         border:4px solid rgb(18, 255, 117); }
        
        .Car .Bag:nth-child(4):hover {transform: scale(0.9) rotate(5deg) ;
         border:4px solid rgb(234, 75, 35);}

        
       
        .Car .Bag:nth-child(1):hover h1:last-child{opacity: 1;}
        .Car .Bag:nth-child(2):hover h1:last-child{opacity: 1;}
        .Car .Bag:nth-child(3):hover h1:last-child{opacity: 1;}
        .Car .Bag:nth-child(4):hover h1:last-child{opacity: 1;}

    </style>
</head>

<body>

    <header>Result Room</header>

    <div class="Car"> 
      
      <div class="Bag"> 
        <h1>Semester 1</h1>
        <img src="MainImg.jpg" alt="Main Image"> 
        <h1 id="passed">Passed</h1>
      </div>

      <div class="Bag"> 
        <h1>Semester 2</h1>
        <img src="MainImg.jpg" alt="Main Image"> 
        <h1 id="passed">Passed</h1>
      </div>

      <div class="Bag"> 
        <h1>Semester 3</h1>
        <img src="MainImg.jpg" alt="Main Image"> 
        <h1 id="passed">Passed</h1>
      </div>

      <div class="Bag"> 
        <h1>Semester 4</h1>
        <img src="MainImg.jpg" alt="Main Image"> 
        <h1 id="failed">Failed</h1>
      </div>
      
    </div>
    <footer>Queries? Contact us: Guptaomshi@gmail.com</footer>
    
</body>

</html>
